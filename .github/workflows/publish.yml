name: Publish GHCR image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. v1, 2026-04-05)"
        required: true
        default: "v1"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/atari-st-builder:${{ inputs.tag }}
            ghcr.io/${{ github.repository_owner }}/atari-st-builder:latest
